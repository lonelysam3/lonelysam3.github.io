<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" dir="{{ $.Param "languagedir" | default "ltr" }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    
    {{- partial "head.html" . -}}
    
    <style>
        /* 与之前相同的样式，但添加权限检查 */
        :root {
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
            --border-color: #dee2e6;
        }
        
        .todo-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        /* 登录提示 */
        .auth-prompt {
            text-align: center;
            padding: 3rem;
            max-width: 500px;
            margin: 4rem auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .auth-prompt h2 {
            color: #e74c3c;
            margin-bottom: 1rem;
        }
        
        .auth-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            margin-top: 1rem;
        }
        
        /* Todo 界面 */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }
        
        .todo-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
        }
        
        .todo-btn {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .todo-stats {
            display: flex;
            justify-content: space-between;
            padding: 1rem;
            background-color: var(--light-color);
            border-radius: 6px;
            margin-bottom: 2rem;
        }
        
        .todo-list {
            list-style: none;
            padding: 0;
        }
        
        .todo-item {
            background-color: white;
            padding: 1rem;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid var(--primary-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .todo-item.completed {
            opacity: 0.7;
            border-left-color: var(--success-color);
        }
        
        .todo-text {
            flex: 1;
            font-size: 16px;
        }
        
        .todo-text.completed {
            text-decoration: line-through;
            color: #6c757d;
        }
        
        .todo-actions {
            display: flex;
            gap: 10px;
        }
        
        .user-info {
            text-align: right;
            padding: 0.5rem;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    {{- partial "header.html" . -}}
    
    <main class="post">
        <article class="post-content">
            <div id="todoContainer">
                <!-- 内容由 JavaScript 动态加载 -->
            </div>
        </article>
    </main>
    
    {{- partial "footer.html" . -}}
    
    <script>
        // 会话管理
        const SESSION_KEY = 'todo_auth_session_v2';
        const PASSWORD_FILE_URL = '/api/password.json';
        
        class AuthManager {
            constructor() {
                this.isAuthenticated = false;
                this.userInfo = null;
            }
            
            checkAuth() {
                const session = localStorage.getItem(SESSION_KEY);
                if (session) {
                    try {
                        const sessionData = JSON.parse(session);
                        const now = new Date().getTime();
                        
                        if (now < sessionData.expires) {
                            this.isAuthenticated = true;
                            this.userInfo = sessionData.user;
                            return true;
                        }
                    } catch (e) {
                        console.error('会话验证失败:', e);
                    }
                    
                    // 清除过期会话
                    localStorage.removeItem(SESSION_KEY);
                }
                
                return false;
            }
            
            logout() {
                localStorage.removeItem(SESSION_KEY);
                document.cookie = 'todo_auth=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
                this.isAuthenticated = false;
                this.userInfo = null;
            }
            
            getRemainingTime() {
                const session = localStorage.getItem(SESSION_KEY);
                if (session) {
                    try {
                        const sessionData = JSON.parse(session);
                        const now = new Date().getTime();
                        return Math.max(0, sessionData.expires - now);
                    } catch (e) {
                        return 0;
                    }
                }
                return 0;
            }
        }
        
        class TodoApp {
            constructor() {
                this.auth = new AuthManager();
                this.todos = JSON.parse(localStorage.getItem('hugo_todos_v2')) || [];
                this.currentFilter = 'all';
                this.init();
            }
            
            init() {
                // 检查登录状态
                if (this.auth.checkAuth()) {
                    this.showTodoApp();
                } else {
                    this.showLoginPrompt();
                }
            }
            
            showLoginPrompt() {
                const container = document.getElementById('todoContainer');
                container.innerHTML = `
                    <div class="auth-prompt">
                        <h2>🔒 需要登录</h2>
                        <p>您需要登录才能访问此页面</p>
                        <p>请前往登录页面验证您的身份</p>
                        <a href="/login/" class="auth-btn">前往登录</a>
                        <div style="margin-top: 2rem; color: #666; font-size: 14px;">
                            <p>📝 这是一个受保护的待办事项列表</p>
                            <p>🔐 只有授权用户可以访问和编辑</p>
                        </div>
                    </div>
                `;
            }
            
            showTodoApp() {
                const container = document.getElementById('todoContainer');
                const remainingTime = this.auth.getRemainingTime();
                const hoursLeft = Math.floor(remainingTime / (60 * 60 * 1000));
                
                container.innerHTML = `
                    <div class="todo-container">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                            <div>
                                <h1>{{ .Title }}</h1>
                                <p>{{ .Description }}</p>
                            </div>
                            <div class="user-info">
                                <div>👤 管理员</div>
                                <div>⏰ 登录剩余: ${hoursLeft}小时</div>
                                <button id="logoutBtn" style="margin-top: 5px; padding: 5px 10px; background: none; border: 1px solid #ddd; border-radius: 4px; cursor: pointer;">
                                    退出登录
                                </button>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <input type="text" id="todoInput" class="todo-input" placeholder="添加新的任务..." />
                            <button id="addBtn" class="todo-btn">添加任务</button>
                        </div>
                        
                        <div class="controls">
                            <div class="filter-buttons">
                                <button class="filter-btn active" data-filter="all">全部</button>
                                <button class="filter-btn" data-filter="active">进行中</button>
                                <button class="filter-btn" data-filter="completed">已完成</button>
                            </div>
                            <button id="clearCompleted" class="todo-btn">清除已完成</button>
                        </div>
                        
                        <div class="todo-stats">
                            <div>总任务: <span id="totalCount">0</span></div>
                            <div>进行中: <span id="activeCount">0</span></div>
                            <div>已完成: <span id="completedCount">0</span></div>
                        </div>
                        
                        <ul id="todoList" class="todo-list">
                            <!-- 任务会在这里动态添加 -->
                        </ul>
                        
                        <div id="emptyState" class="empty-state" style="display: none; text-align: center; padding: 3rem; color: #666;">
                            <h3>暂无任务</h3>
                            <p>添加您的第一个任务来开始吧！</p>
                        </div>
                        
                        <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; color: #666; font-size: 14px;">
                            <p>💡 提示：</p>
                            <ul style="padding-left: 1.5rem;">
                                <li>点击复选框标记任务完成</li>
                                <li>使用筛选按钮查看不同类型的任务</li>
                                <li>登录状态将在24小时后自动过期</li>
                            </ul>
                        </div>
                    </div>
                `;
                
                this.bindEvents();
                this.renderTodos();
                
                // 添加一些样式
                const style = document.createElement('style');
                style.textContent = `
                    .empty-state { display: none; text-align: center; padding: 3rem; color: #666; }
                    .filter-btn { padding: 8px 16px; background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 4px; cursor: pointer; }
                    .filter-btn.active { background-color: #3498db; color: white; }
                `;
                document.head.appendChild(style);
            }
            
            bindEvents() {
                // 添加任务
                document.getElementById('addBtn').addEventListener('click', () => this.addTodo());
                document.getElementById('todoInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTodo();
                });
                
                // 筛选
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.currentFilter = e.target.dataset.filter;
                        document.querySelectorAll('.filter-btn').forEach(b => {
                            b.classList.toggle('active', b === e.target);
                        });
                        this.renderTodos();
                    });
                });
                
                // 清除已完成
                document.getElementById('clearCompleted').addEventListener('click', () => {
                    if (confirm('确定要清除所有已完成的任务吗？')) {
                        this.clearCompleted();
                    }
                });
                
                // 退出登录
                document.getElementById('logoutBtn').addEventListener('click', () => {
                    if (confirm('确定要退出登录吗？')) {
                        this.auth.logout();
                        this.showLoginPrompt();
                    }
                });
            }
            
            addTodo() {
                const input = document.getElementById('todoInput');
                const text = input.value.trim();
                
                if (text) {
                    const todo = {
                        id: Date.now(),
                        text: text,
                        completed: false,
                        createdAt: new Date().toLocaleDateString('zh-CN'),
                        createdTime: new Date().toISOString()
                    };
                    
                    this.todos.unshift(todo);
                    this.saveTodos();
                    this.renderTodos();
                    input.value = '';
                    input.focus();
                }
            }
            
            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    if (todo.completed) {
                        todo.completedAt = new Date().toISOString();
                    }
                    this.saveTodos();
                    this.renderTodos();
                }
            }
            
            deleteTodo(id) {
                if (confirm('确定要删除这个任务吗？')) {
                    this.todos = this.todos.filter(t => t.id !== id);
                    this.saveTodos();
                    this.renderTodos();
                }
            }
            
            clearCompleted() {
                this.todos = this.todos.filter(t => !t.completed);
                this.saveTodos();
                this.renderTodos();
            }
            
            saveTodos() {
                localStorage.setItem('hugo_todos_v2', JSON.stringify(this.todos));
            }
            
            renderTodos() {
                const todoList = document.getElementById('todoList');
                const emptyState = document.getElementById('emptyState');
                
                // 筛选任务
                let filteredTodos = this.todos;
                if (this.currentFilter === 'active') {
                    filteredTodos = this.todos.filter(t => !t.completed);
                } else if (this.currentFilter === 'completed') {
                    filteredTodos = this.todos.filter(t => t.completed);
                }
                
                // 更新统计
                const total = this.todos.length;
                const completed = this.todos.filter(t => t.completed).length;
                const active = total - completed;
                
                document.getElementById('totalCount').textContent = total;
                document.getElementById('activeCount').textContent = active;
                document.getElementById('completedCount').textContent = completed;
                
                // 渲染列表
                if (filteredTodos.length === 0) {
                    if (todoList) todoList.innerHTML = '';
                    if (emptyState) emptyState.style.display = 'block';
                } else {
                    if (emptyState) emptyState.style.display = 'none';
                    
                    if (todoList) {
                        todoList.innerHTML = filteredTodos.map(todo => `
                            <li class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                                <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''}>
                                <span class="todo-text ${todo.completed ? 'completed' : ''}">
                                    ${todo.text}
                                </span>
                                <div class="todo-actions">
                                    <button class="todo-action-btn delete-btn">删除</button>
                                </div>
                                <div class="todo-date">
                                    ${todo.createdAt}
                                    ${todo.completed ? '<br><small>✓ 已完成</small>' : ''}
                                </div>
                            </li>
                        `).join('');
                        
                        // 绑定事件
                        todoList.querySelectorAll('.todo-checkbox').forEach(checkbox => {
                            checkbox.addEventListener('change', (e) => {
                                const id = parseInt(e.target.closest('.todo-item').dataset.id);
                                this.toggleTodo(id);
                            });
                        });
                        
                        todoList.querySelectorAll('.delete-btn').forEach(btn => {
                            btn.addEventListener('click', (e) => {
                                const id = parseInt(e.target.closest('.todo-item').dataset.id);
                                this.deleteTodo(id);
                            });
                        });
                    }
                }
            }
        }
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            new TodoApp();
        });
    </script>
</body>
</html>
