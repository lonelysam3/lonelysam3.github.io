<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" dir="{{ $.Param "languagedir" | default "ltr" }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    
    {{- partial "head.html" . -}}
    
    <style>
        .login-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2rem;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .login-title {
            margin-bottom: 1.5rem;
            color: #333;
        }
        
        .login-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .login-input:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            font-size: 16px;
        }
        
        .login-btn:hover {
            background-color: #2980b9;
        }
        
        .login-btn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        
        .login-message {
            color: #e74c3c;
            margin-top: 10px;
            min-height: 24px;
            font-size: 14px;
        }
        
        .login-success {
            color: #2ecc71 !important;
        }
        
        .login-info {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        
        .guest-access {
            margin-top: 2rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #dee2e6;
        }
        
        .guest-access h3 {
            margin-top: 0;
            color: #555;
        }
        
        .guest-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            margin-top: 10px;
        }
        
        .guest-btn:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    {{- partial "header.html" . -}}
    
    <main class="post">
        <article class="post-content">
            <div class="login-container">
                <h1 class="login-title">🔒 登录</h1>
                <p>登录以编辑待办事项</p>
                
                <form id="loginForm">
                    <input type="password" 
                           id="passwordInput" 
                           class="login-input" 
                           placeholder="输入密码"
                           autocomplete="current-password"
                           required>
                    
                    <button type="submit" id="loginBtn" class="login-btn">
                        登录
                    </button>
                    
                    <div id="loginMessage" class="login-message"></div>
                </form>
                
                <div class="login-info">
                    <p>🔐 登录状态有效期24小时</p>
                    <p>✏️ 登录后可添加、编辑、删除任务</p>
                </div>
                
                <div class="guest-access">
                    <h3>👀 访客访问</h3>
                    <p>只想查看任务？您可以以只读模式访问</p>
                    <a href="/todo/" class="guest-btn">以访客身份查看</a>
                    <p style="font-size: 12px; margin-top: 10px; color: #666;">
                        * 访客只能查看任务，不能编辑
                    </p>
                </div>
            </div>
        </article>
    </main>
    
    {{- partial "footer.html" . -}}
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const passwordInput = document.getElementById('passwordInput');
            const loginBtn = document.getElementById('loginBtn');
            const loginMessage = document.getElementById('loginMessage');
            
            // 检查是否已经登录
            if (checkLoginStatus()) {
                window.location.href = '/todo/';
                return;
            }
            
            // 表单提交事件
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                await handleLogin();
            });
            
            // 密码输入框回车事件
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleLogin();
                }
            });
            
            async function handleLogin() {
                const password = passwordInput.value.trim();
                
                if (!password) {
                    showMessage('请输入密码', 'error');
                    passwordInput.focus();
                    return;
                }
                
                // 禁用登录按钮
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span style="display:inline-block;width:16px;height:16px;border:2px solid #fff;border-radius:50%;border-top-color:transparent;animation:spin 1s linear infinite;margin-right:5px;"></span> 验证中...';
                
                try {
                    // 验证密码
                    const isValid = await validatePassword(password);
                    
                    if (isValid) {
                        // 登录成功
                        showMessage('登录成功！正在跳转...', 'success');
                        createSession();
                        
                        // 2秒后跳转
                        setTimeout(() => {
                            window.location.href = '/todo/';
                        }, 2000);
                    } else {
                        // 登录失败
                        showMessage('密码错误，请重试', 'error');
                        passwordInput.value = '';
                        passwordInput.focus();
                    }
                } catch (error) {
                    console.error('登录出错:', error);
                    showMessage('登录过程出错，请重试', 'error');
                } finally {
                    // 恢复登录按钮
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '登录';
                }
            }
            
            async function validatePassword(inputPassword) {
                try {
                    // 从配置文件读取密码哈希
                    const response = await fetch('/api/password.json');
                    if (!response.ok) {
                        throw new Error('配置文件加载失败');
                    }
                    
                    const config = await response.json();
                    
                    if (config.hashMethod === 'sha256') {
                        // 计算输入密码的哈希
                        const inputHash = await sha256(inputPassword + config.salt);
                        return inputHash === config.hash;
                    } else if (config.password) {
                        // 直接比较密码（仅用于测试）
                        return inputPassword === config.password;
                    }
                    
                    return false;
                } catch (error) {
                    console.error('密码验证失败:', error);
                    return false;
                }
            }
            
            async function sha256(message) {
                const msgBuffer = new TextEncoder().encode(message);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }
            
            function createSession() {
                const now = new Date().getTime();
                const expires = now + (24 * 60 * 60 * 1000); // 24小时
                
                const sessionData = {
                    authenticated: true,
                    expires: expires,
                    created: now,
                    user: 'admin'
                };
                
                localStorage.setItem('todo_session', JSON.stringify(sessionData));
            }
            
            function checkLoginStatus() {
                const session = localStorage.getItem('todo_session');
                if (session) {
                    try {
                        const sessionData = JSON.parse(session);
                        const now = new Date().getTime();
                        
                        if (now < sessionData.expires) {
                            return true;
                        } else {
                            localStorage.removeItem('todo_session');
                        }
                    } catch (e) {
                        console.error('会话数据损坏:', e);
                        localStorage.removeItem('todo_session');
                    }
                }
                return false;
            }
            
            function showMessage(text, type = 'error') {
                loginMessage.textContent = text;
                loginMessage.className = 'login-message ' + (type === 'success' ? 'login-success' : '');
                loginMessage.style.display = 'block';
                
                // 5秒后隐藏错误消息，成功消息不自动隐藏
                if (type === 'error') {
                    setTimeout(() => {
                        loginMessage.style.display = 'none';
                    }, 5000);
                }
            }
            
            // 初始化时聚焦到密码输入框
            passwordInput.focus();
        });
    </script>
</body>
</html>
